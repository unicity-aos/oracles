# Astrid for Grok Build — shared oracle broker only (no supervised headless yet).
schema-version = 1

[distro]
id = "grok"
name = "grok"
pretty-name = "Astrid for Grok Build"
version = "0.2.0"
description = "Grok Build, governed by Astrid — shared oracle broker and per-principal provisioning."
maintainers = ["Joshua J. Bouw <dev@joshuajbouw.com>"]
repository = "https://github.com/unicity-astrid/oracles"
license = "MIT OR Apache-2.0"
astrid-version = ">=0.9.1"

# Tool capsules (fs/http/shell/skills) are intentionally absent: the host app
# already brings its own file, web, shell, and skills tools. Astrid ships only
# what the host lacks — system introspection and forge capsule authoring.
[[capsule]]
name = "astrid-capsule-cli"
source = "@unicity-astrid/capsule-cli"
version = "0.2.0"
role = "uplink"

[[capsule]]
name = "astrid-mcp"
source = "@unicity-astrid/oracles"
version = "0.1.0"

[[capsule]]
name = "astrid-capsule-forge"
source = "@unicity-astrid/capsule-forge"
version = "0.1.0"

[[capsule]]
name = "astrid-capsule-system"
source = "@unicity-astrid/capsule-system"
version = "0.2.0"

